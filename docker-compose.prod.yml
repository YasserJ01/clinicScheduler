services:
  nginx:
    environment:
      - RATE_LIMIT=30r/s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    restart: unless-stopped

  worker:
    environment:
      - FRONTEND_URL=${FRONTEND_URL:-https://app.clinic.example.com}
      - ALEMBIC_ENABLED=true
      - LOG_LEVEL=warning
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set for production}
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://clinic:${DB_PASSWORD:?DB_PASSWORD must be set}@pgbouncer:6432/${DB_NAME:-clinic_db}
    deploy:
      replicas: 3
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    stop_grace_period: 15s
    restart: unless-stopped

  db:
    environment:
      - POSTGRES_USER=${DB_USER:-clinic}
      - POSTGRES_PASSWORD=${DB_PASSWORD:?DB_PASSWORD must be set for production}
      - POSTGRES_DB=${DB_NAME:-clinic_db}
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    restart: unless-stopped

  pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-clinic}:${DB_PASSWORD:?DB_PASSWORD must be set}@db:5432/${DB_NAME:-clinic_db}
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=200
      - DEFAULT_POOL_SIZE=20
      - ADMIN_USERS=${DB_USER:-clinic}
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    restart: unless-stopped

  redis:
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfilename clinic_aof.aof
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set for production}
    volumes:
      - redis-data:/data
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    restart: unless-stopped
