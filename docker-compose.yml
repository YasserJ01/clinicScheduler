services:
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      worker:
        condition: service_healthy
    networks:
      - clinic-net
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    deploy:
      replicas: 3
    environment:
      - DATABASE_URL=postgresql+asyncpg://clinic:clinicpass@db:5432/clinic_db
      - REDIS_URL=redis://:redispass@redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - LOG_LEVEL=info
      - FRONTEND_URL=${FRONTEND_URL:-*}
      - CHAOS_ENABLED=true
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - clinic-net
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=clinic
      - POSTGRES_PASSWORD=clinicpass
      - POSTGRES_DB=clinic_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinic"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - clinic-net
    restart: unless-stopped

  pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      - DATABASE_URL=postgresql://clinic:clinicpass@db:5432/clinic_db
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=200
      - DEFAULT_POOL_SIZE=20
      - AUTH_TYPE=trust
      - ADMIN_USERS=clinic
    ports:
      - "6432:5432"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - clinic-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfilename clinic_aof.aof
      --requirepass redispass
    volumes:
      - redis-data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redispass", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - clinic-net
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"
      - "6831:6831/udp"
      - "14268:14268"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - clinic-net
    restart: unless-stopped

networks:
  clinic-net:
    driver: bridge

volumes:
  pgdata:
  redis-data:
