apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: clinic-ingress
  namespace: clinic-scheduler
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - clinic.example.com
      secretName: clinic-tls
  rules:
    - host: clinic.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: clinic-worker
                port:
                  number: 8000
          - path: /docs
            pathType: Prefix
            backend:
              service:
                name: clinic-worker
                port:
                  number: 8000
          - path: /redoc
            pathType: Prefix
            backend:
              service:
                name: clinic-worker
                port:
                  number: 8000
          - path: /openapi.json
            pathType: Prefix
            backend:
              service:
                name: clinic-worker
                port:
                  number: 8000
