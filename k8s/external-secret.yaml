apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: clinic-scheduler-secrets
  namespace: clinic-scheduler
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: clinic-scheduler-secrets
    creationPolicy: Owner
  data:
    - secretKey: SECRET_KEY
      remoteRef:
        key: clinic-scheduler/production
        property: SECRET_KEY
    - secretKey: DB_PASSWORD
      remoteRef:
        key: clinic-scheduler/production
        property: DB_PASSWORD
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: clinic-scheduler/production
        property: REDIS_PASSWORD
    - secretKey: SENDGRID_API_KEY
      remoteRef:
        key: clinic-scheduler/production
        property: SENDGRID_API_KEY
    - secretKey: SMTP_HOST
      remoteRef:
        key: clinic-scheduler/production
        property: SMTP_HOST
    - secretKey: SMTP_PORT
      remoteRef:
        key: clinic-scheduler/production
        property: SMTP_PORT
    - secretKey: FROM_EMAIL
      remoteRef:
        key: clinic-scheduler/production
        property: FROM_EMAIL
    - secretKey: BACKUP_ENCRYPTION_KEY
      remoteRef:
        key: clinic-scheduler/production
        property: BACKUP_ENCRYPTION_KEY
