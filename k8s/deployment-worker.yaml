apiVersion: apps/v1
kind: Deployment
metadata:
  name: clinic-worker
  namespace: clinic-scheduler
  labels:
    app: clinic-worker
spec:
  replicas: 3
  selector:
    matchLabels:
      app: clinic-worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: clinic-worker
    spec:
      containers:
        - name: worker
          image: clinic-scheduler-worker:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: clinic-scheduler-config
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: clinic-scheduler-secrets
                  key: SECRET_KEY
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clinic-scheduler-secrets
                  key: DB_PASSWORD
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clinic-scheduler-secrets
                  key: REDIS_PASSWORD
            - name: DATABASE_URL
              value: "postgresql+asyncpg://clinic:$(DB_PASSWORD)@clinic-postgres:5432/clinic_db"
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@clinic-redis:6379/0"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      terminationGracePeriodSeconds: 15
