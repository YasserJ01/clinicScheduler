name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Lint with ruff
        run: ruff check app/ tests/
      - name: Check formatting
        run: ruff format --check app/ tests/

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install bandit
        run: pip install bandit
      - name: Run bandit security scan
        run: bandit -r app/ -ll

  nginx-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate NGINX config
        run: |
          sed 's/worker:8000/127.0.0.1:8000/g' nginx/nginx.conf > /tmp/nginx-ci.conf
          docker run --rm \
            -v /tmp/nginx-ci.conf:/etc/nginx/custom/nginx.conf:ro \
            nginx:1.25-alpine \
            nginx -t -c /etc/nginx/custom/nginx.conf

  test:
    needs: [lint, security, nginx-config]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: clinic
          POSTGRES_PASSWORD: clinicpass
          POSTGRES_DB: clinic_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U clinic -d clinic_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        command: >-
          redis-server
          --requirepass redispass
          --appendonly yes
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli -a redispass ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://clinic:clinicpass@localhost:5432/clinic_db
      REDIS_URL: redis://:redispass@localhost:6379/0
      SECRET_KEY: ci-test-secret-key
      CHAOS_ENABLED: "true"
      FRONTEND_URL: "*"
      BASE_URL: http://localhost:8000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run unit tests
        run: python -m pytest tests/unit/ -v
      - name: Start API server
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 --log-level info &
          UVICORN_PID=$!
          echo "uvicorn PID: $UVICORN_PID"
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/api/v1/health > /dev/null 2>&1; then
              echo "API is ready after $i attempts"
              break
            fi
            echo "Waiting for API... (attempt $i)"
            sleep 2
          done
          curl -sf http://localhost:8000/api/v1/health || {
            echo "API failed to start. Logs:"
            cat /proc/$UVICORN_PID/fd/1 2>/dev/null || echo "No logs available"
            exit 1
          }
      - name: Run integration tests
        run: python -m pytest tests/integration/ -v
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: pytest-results.xml
        continue-on-error: true
