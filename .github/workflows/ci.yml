name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Lint with ruff
        run: ruff check app/ tests/
      - name: Check formatting
        run: ruff format --check app/ tests/

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install bandit
        run: pip install bandit
      - name: Run bandit security scan
        run: bandit -r app/ -ll

  nginx-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate NGINX config
        run: |
          sed 's/worker:8000/127.0.0.1:8000/g' nginx/nginx.conf > /tmp/nginx-ci.conf
          docker run --rm \
            -v /tmp/nginx-ci.conf:/etc/nginx/custom/nginx.conf:ro \
            nginx:1.25-alpine \
            nginx -t -c /etc/nginx/custom/nginx.conf

  test:
    needs: [lint, security, nginx-config]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: clinic
          POSTGRES_PASSWORD: clinicpass
          POSTGRES_DB: clinic_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run unit tests
        run: python -m pytest tests/unit/ -v
      - name: Build Docker images
        run: docker compose build
      - name: Start services
        run: docker compose up -d
      - name: Wait for services to be healthy
        run: |
          for i in {1..30}; do
            if curl -f http://localhost/api/v1/health; then
              echo "Services are healthy"
              break
            fi
            echo "Waiting for services... ($i)"
            sleep 5
          done
      - name: Run integration tests
        run: python -m pytest tests/integration/ -v
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: pytest-results.xml
        continue-on-error: true
